version: '3.8'

services:
  # ------------------------------------
  # Frontend: React (Production Mode)
  # ------------------------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      # 👇 สำคัญ: React ต้องการค่านี้ตอน Build Image เพื่อให้รู้ว่า Backend อยู่ไหน
      args:
        - VITE_API_PATH=${VITE_API_PATH} 
    container_name: udp-client
    restart: always
    ports:
      - "3091:80"  # ✅ เปิดไว้เพื่อเข้าผ่าน IP:3091 หรือให้ Nginx หลัก Proxy เข้ามา
    environment:
      - TZ=Asia/Bangkok
    networks:
      - shared-network

  # ------------------------------------
  # Backend: Node.js (Production Mode)
  # ------------------------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile      # ✅ แนะนำให้ใช้ไฟล์สำหรับ Prod (ที่ใช้ node server.js)
    container_name: udp-server
    restart: always
    ports:
      - "3092:3092"
    environment:
      - PORT=3092
      - NODE_ENV=production
      - TZ=Asia/Bangkok
      # 👇 Database Config (รับค่าจาก Portainer)
      - DB_HOST=db-mysql          # อ้างอิงชื่อ Container DB ใน Stack หลัก
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD} # รับค่า Password จาก Env
      - DB_NAME=${DB_NAME}        # ชื่อ Database ที่จะใช้
      - JWT_SECRET=${JWT_SECRET}
      - REFRESH_SECRET=${REFRESH_SECRET}
    networks:
      - shared-network
    volumes:
      - ./server/src/img:/app/src/img

networks:
  shared-network:
    external: true