version: '3.8'

services:
  # ------------------------------------
  # Frontend: React (Production Mode)
  # ------------------------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod  # ✅ เปลี่ยนไปใช้ไฟล์สำหรับ Production
    container_name: udp-client-prod
    restart: always
    ports:
      # ✅ มักจะ map เข้า port 80 ของ Nginx ใน Container (ปรับได้ตาม Dockerfile ของคุณ)
      - "3091:80"               
    environment:
      - TZ=Asia/Bangkok
    networks:
      - shared-network
    # ❌ เอา volumes ที่ sync code และ CHOKIDAR_USEPOLLING ออก

  # ------------------------------------
  # Backend: Node.js (Production Mode)
  # ------------------------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prod  # ✅ เปลี่ยนไปใช้ไฟล์สำหรับ Production
    container_name: udp-server-prod
    restart: always
    ports:
      - "3092:3092"
    environment:
      - PORT=3092
      - NODE_ENV=production        # ✅ เปลี่ยนเป็น production
      - TZ=Asia/Bangkok
      - DB_HOST=db-mysql
      - DB_PORT=3306
    env_file:
      - ./server/.env
    volumes:
      # ✅ เก็บไว้เฉพาะโฟลเดอร์ที่ต้องการเก็บข้อมูลถาวร เช่น รูปภาพที่อัปโหลด
      - ./server/src/img:/app/src/img 
    networks:
      - shared-network

networks:
  shared-network:
    external: true